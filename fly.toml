app = "taskpilot-ai"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DB_PATH = "/data/taskpilot.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "taskpilot_data"
  destination = "/data"
